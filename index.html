<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="위클리민">
<meta name="theme-color" content="#FAFAF9">
<link rel="apple-touch-icon" href="weeklymin.png">
<link rel="icon" href="weeklymin.png">
<title>weeklymin</title>
<link rel="stylesheet" as="style" crossorigin
  href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.css" />
<style>
  /* =========================================================
     weeklymin — Design tokens
     Palettes controlled via [data-palette] on <html>.
     ========================================================= */
  :root{
    /* Default: Mono */
    --canvas:#FAFAF9;
    --surface:#FFFFFF;
    --surface-2:#F3F2F0;
    --ink:#111111;
    --ink-soft:#3A3A38;
    --muted:#7A7874;
    --muted-2:#B4B1AC;
    --hairline:rgba(17,17,17,0.09);
    --hairline-strong:rgba(17,17,17,0.16);
    --accent:#111111;
    --accent-contrast:#FAFAF9;
    --check-fill:#111111;
    --check-mark:#FAFAF9;
    --today:#111111;
    --today-tint:rgba(17,17,17,0.06);
    --danger:#B4361B;
    --sat:#2E70A8;
    --sun:#B4361B;
    --shadow-1: 0 1px 2px rgba(17,17,17,0.04), 0 4px 14px rgba(17,17,17,0.04);
    --shadow-2: 0 8px 30px rgba(17,17,17,0.10);
    --radius-cell: 14px;
    --radius-lg: 20px;
    --radius-pill: 999px;
    --font-scale: 1;
  }
  html[data-palette="beige"]{
    --canvas:#F3F0EA;
    --surface:#FCFAF6;
    --surface-2:#EAE4DA;
    --ink:#1F1B15;
    --ink-soft:#3E372B;
    --muted:#7A7367;
    --muted-2:#B7AE9E;
    --hairline:rgba(31,27,21,0.10);
    --hairline-strong:rgba(31,27,21,0.18);
    --accent:#CF4500;
    --accent-contrast:#FCFAF6;
    --check-fill:#1F1B15;
    --check-mark:#FCFAF6;
    --today:#CF4500;
    --today-tint:rgba(207,69,0,0.10);
    --danger:#B4361B;
    --sat:#2E70A8;
    --sun:#B4361B;
  }
  html[data-palette="paper"]{
    --canvas:#F5F1EA;
    --surface:#FFFDF7;
    --surface-2:#E9E3D5;
    --ink:#26241E;
    --ink-soft:#4A4638;
    --muted:#807a6c;
    --muted-2:#BDB6A5;
    --hairline:rgba(38,36,30,0.10);
    --hairline-strong:rgba(38,36,30,0.18);
    --accent:#3A5A40;
    --accent-contrast:#FFFDF7;
    --check-fill:#26241E;
    --check-mark:#FFFDF7;
    --today:#3A5A40;
    --today-tint:rgba(58,90,64,0.10);
    --danger:#9E3B1B;
    --sat:#2E6E8E;
    --sun:#9E3B1B;
  }
  html[data-palette="pastel"]{
    --canvas:#F6F3F8;
    --surface:#FFFFFF;
    --surface-2:#ECE7EE;
    --ink:#2A2432;
    --ink-soft:#4E4657;
    --muted:#8A8394;
    --muted-2:#C4BFCB;
    --hairline:rgba(42,36,50,0.09);
    --hairline-strong:rgba(42,36,50,0.16);
    --accent:#7C6BE8;
    --accent-contrast:#FFFFFF;
    --check-fill:#7C6BE8;
    --check-mark:#FFFFFF;
    --today:#7C6BE8;
    --today-tint:rgba(124,107,232,0.10);
    --danger:#D64B6E;
    --sat:#5A7FD6;
    --sun:#D64B6E;
  }
  html[data-palette="dark"]{
    --canvas:#0F0F0E;
    --surface:#1A1A18;
    --surface-2:#242422;
    --ink:#F5F4F1;
    --ink-soft:#CFCEC9;
    --muted:#8E8C87;
    --muted-2:#5F5D58;
    --hairline:rgba(245,244,241,0.10);
    --hairline-strong:rgba(245,244,241,0.20);
    --accent:#F5F4F1;
    --accent-contrast:#0F0F0E;
    --check-fill:#F5F4F1;
    --check-mark:#0F0F0E;
    --today:#F5F4F1;
    --today-tint:rgba(245,244,241,0.08);
    --danger:#E86C4A;
    --sat:#6FA8DC;
    --sun:#E8896C;
  }

  /* Cell shape variants */
  html[data-cell-shape="rounded"]{ --radius-cell:14px; }
  html[data-cell-shape="square"] { --radius-cell:4px; }
  html[data-cell-shape="circle"] { --radius-cell:999px; }

  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  html{ height:100%; }
  body{
    background:var(--canvas);
    color:var(--ink);
    font-family:'Pretendard Variable',Pretendard,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    font-weight:450;
    font-size:calc(15px * var(--font-scale));
    -webkit-font-smoothing:antialiased;
    letter-spacing:-0.01em;
    height:100vh;
    height:100dvh;
    display:flex;
    flex-direction:column;
    overflow:hidden;
  }
  button{font-family:inherit; letter-spacing:inherit;}
  input,textarea{font-family:inherit; letter-spacing:inherit;}

  /* ============ Top bar ============ */
  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    padding:22px 22px 4px;
    max-width:900px; margin:0 auto;
    width:100%;
    box-sizing:border-box;
    flex:none;
  }
  .brand{
    display:flex; align-items:center; gap:9px;
    font-weight:700; font-size:18px; letter-spacing:-0.02em;
    color:var(--ink);
  }
  .brand .brand-mark{
    width:26px; height:26px; display:block;
  }
  .brand .brand-mark svg{ width:100%; height:100%; display:block; }
  .brand-name{
    font-weight:700; font-size:19px; letter-spacing:-0.03em;
  }
  .brand-name .dot{
    color:var(--accent);
  }
  .top-actions{
    display:flex; align-items:center; gap:8px;
  }
  .icon-btn{
    width:38px; height:38px; border-radius:50%;
    background:var(--surface); border:1px solid var(--hairline);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; color:var(--ink); flex:none;
    transition: transform .12s ease, background .12s ease;
  }
  .icon-btn:active{ transform:scale(0.94); }
  .icon-btn svg{ width:18px; height:18px; stroke:currentColor; fill:none; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round;}

  /* ============ Week nav ============ */
  .week-nav{
    position:relative;
    display:flex; align-items:center; justify-content:center; gap:6px;
    padding:14px 22px 10px;
    max-width:900px; margin:0 auto;
    width:100%;
    box-sizing:border-box;
    flex:none;
  }
  .week-nav-arrow{
    width:34px; height:34px; border-radius:50%;
    background:transparent; border:1px solid var(--hairline);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; flex:none; color:var(--ink);
  }
  .week-nav-arrow:hover{ background:var(--surface); }
  .week-nav-arrow svg{ width:15px; height:15px; stroke:currentColor; fill:none; stroke-width:2.2; stroke-linecap:round; stroke-linejoin:round;}
  .week-pill{
    background:var(--ink); color:var(--canvas);
    border-radius:var(--radius-pill);
    padding:10px 18px;
    font-weight:600; font-size:14px; letter-spacing:-0.02em;
    display:flex; align-items:center; gap:9px;
    cursor:pointer; white-space:nowrap;
    line-height:1;
  }
  .week-pill .this-week-badge{
    font-size:10.5px; font-weight:700;
    color:var(--accent); background:var(--accent-contrast);
    padding:3px 7px; border-radius:var(--radius-pill);
    letter-spacing:0;
  }
  html[data-palette="mono"] .week-pill .this-week-badge,
  html:not([data-palette]) .week-pill .this-week-badge{
    color:var(--canvas); background:rgba(255,255,255,0.16);
  }
  .week-pill .range-sub{
    font-size:11.5px; opacity:0.6; font-weight:500;
  }
  .week-tools{
    display:flex; align-items:center; justify-content:center;
    padding:0 22px;
    margin-bottom:8px;
    min-height:0;
  }
  .jump-today-btn{
    display:none; align-items:center; gap:5px;
    background:var(--surface); border:1px solid var(--hairline-strong);
    color:var(--ink); font-weight:600; font-size:12px;
    padding:7px 14px; border-radius:var(--radius-pill); cursor:pointer;
    white-space:nowrap;
  }
  .jump-today-btn.show{ display:inline-flex; }
  .jump-today-btn svg{ width:12px; height:12px; stroke:currentColor; fill:none; stroke-width:2.2; stroke-linecap:round; stroke-linejoin:round;}
  .holiday-banner{
    display:none;
    flex-wrap:wrap; align-items:center; justify-content:center;
    gap:6px 10px;
    max-width:900px; margin:0 auto 12px;
    padding:0 22px;
    font-size:12px; font-weight:600; color:var(--sun);
    text-align:center;
  }
  .holiday-banner.show{ display:flex; }
  .holiday-banner .holiday-item{
    display:inline-flex; align-items:center; gap:5px;
    white-space:nowrap;
  }
  .holiday-banner .holiday-item::before{
    content:''; width:5px; height:5px; border-radius:50%;
    background:var(--sun); flex:none;
  }
  .holiday-banner .holiday-date{
    color:var(--muted); font-weight:500;
  }
  .date-btn-wrap{
    position:relative;
  }
  #datePicker{
    position:absolute; inset:0;
    width:100%; height:100%;
    opacity:0;
    border:0; padding:0; margin:0;
    cursor:pointer;
    -webkit-appearance:none; appearance:none;
  }

  /* ============ Vertical scroll region (below fixed header) ============ */
  .app-scroll{
    flex:1;
    min-height:0;
    overflow-y:auto;
    overflow-x:hidden;
    -webkit-overflow-scrolling:touch;
    padding-bottom:calc(56px + env(safe-area-inset-bottom));
  }

  /* ============ Grid ============ */
  .grid-wrap{
    display:flex; align-items:flex-start;
    padding:0 16px; gap:6px;
    max-width:900px; margin:0 auto;
  }
  .cat-col{
    flex:none; width:64px;
    display:flex; flex-direction:column; gap:6px;
    z-index:2;
  }
  .days-scroll{
    flex:1; min-width:0;
    overflow-x:auto; overflow-y:hidden;
    -webkit-overflow-scrolling:touch;
    padding-bottom:12px;
    scrollbar-width:thin;
    scrollbar-color:var(--hairline-strong) transparent;
  }
  .days-scroll::-webkit-scrollbar{ height:5px; }
  .days-scroll::-webkit-scrollbar-track{ background:transparent; margin:0 12px; }
  .days-scroll::-webkit-scrollbar-thumb{ background:var(--hairline-strong); border-radius:999px; }
  .days-inner{
    display:flex; flex-direction:column; gap:6px;
    width:max-content;
  }
  .days-row{ display:flex; gap:6px; }

  .head-cell{
    background:transparent; color:var(--muted);
    width:78px; flex:none; height:36px;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    font-weight:600; font-size:11.5px; letter-spacing:0.02em;
    text-transform:uppercase;
    gap:1px;
    border-radius:10px;
    position:relative;
  }
  .head-cell .day-num{
    font-size:13px; color:var(--ink-soft); font-weight:600; letter-spacing:-0.02em; text-transform:none;
  }
  .head-cell.today{
    background:var(--today);
    color:var(--accent-contrast);
  }
  .head-cell.today .day-num{ color:var(--accent-contrast); }
  .head-cell.sat{ color:var(--sat); }
  .head-cell.sat .day-num{ color:var(--sat); }
  .head-cell.sun{ color:var(--sun); }
  .head-cell.sun .day-num{ color:var(--sun); }
  .head-cell.today.sat,
  .head-cell.today.sun{ color:var(--accent-contrast); }
  .head-cell.today.sat .day-num,
  .head-cell.today.sun .day-num{ color:var(--accent-contrast); }
  .head-cell.holiday{ color:var(--sun); }
  .head-cell.holiday .day-num{ color:var(--sun); }
  .head-cell.today.holiday{ color:var(--accent-contrast); }
  .head-cell.today.holiday .day-num{ color:var(--accent-contrast); }
  .holiday-dot{
    position:absolute; top:3px; right:8px;
    width:4px; height:4px; border-radius:50%;
    background:var(--sun);
  }
  .head-cell.today .holiday-dot{ background:var(--accent-contrast); }
  .head-corner{ height:36px; flex:none; }

  .cat-cell{
    background:var(--surface);
    border:1px solid var(--hairline);
    border-radius:var(--radius-cell);
    height:78px; flex:none;
    box-sizing:border-box;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px;
    text-align:center;
    padding:6px 4px;
    line-height:1.2;
    word-break:keep-all;
    transition: padding .18s ease, gap .18s ease;
    overflow:hidden;
    position:relative;
    cursor:pointer;
  }
  .cat-cell .cat-dot{
    width:9px; height:9px; border-radius:50%;
    background:var(--cat-color, var(--ink));
    position:absolute; top:8px; right:8px;
  }
  .cat-cell .cat-icon{
    width:34px; height:34px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:17px; line-height:1;
    position:relative;
    transition:font-size .18s ease, width .18s ease, height .18s ease;
  }
  .cat-cell .cat-icon::before{
    content:''; position:absolute; inset:0; border-radius:50%;
    background:var(--cat-color, var(--ink));
    opacity:.13;
  }
  .cat-cell .cat-name{
    display:block;
    overflow:hidden; text-overflow:ellipsis;
    max-width:100%;
    font-weight:600; font-size:12.5px; letter-spacing:-0.02em;
    color:var(--ink);
  }

  /* Hide category icons if user prefers dot-only */
  html[data-cat-mode="dot"] .cat-cell .cat-icon{ display:none; }
  html[data-cat-mode="dot"] .cat-cell{ gap:2px; }
  html[data-cat-mode="icon"] .cat-cell .cat-dot{ display:none; }

  .data-cell{
    background:var(--surface);
    border:1px solid var(--hairline);
    border-radius:var(--radius-cell);
    width:78px; height:78px; flex:none;
    box-sizing:border-box;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    overflow:hidden;
    position:relative;
    transition: transform .12s ease, border-color .12s ease;
    user-select:none;
  }
  .data-cell:active{ transform:scale(0.96); }
  .data-cell.today-col{
    box-shadow: inset 0 0 0 1.5px var(--today);
  }
  .data-cell.weekend-col{
  }
  .data-cell.filled-check{
    background:var(--check-fill);
    border-color:var(--check-fill);
  }
  .data-cell.filled-check .check-mark{
    width:56%; height:56%;
    stroke:var(--check-mark); fill:none; stroke-width:2.6; stroke-linecap:round; stroke-linejoin:round;
  }
  .data-cell img{
    width:100%; height:100%; object-fit:cover;
  }
  .data-cell .txt-preview{
    font-size:11.5px; font-weight:500; color:var(--ink);
    padding:7px; text-align:center; line-height:1.35;
    display:-webkit-box; -webkit-line-clamp:4; -webkit-box-orient:vertical;
    overflow:hidden; word-break:break-word;
  }
  .cell-text-overlay{
    position:absolute; left:0; right:0; bottom:0;
    background:linear-gradient(to top, rgba(0,0,0,0.85), rgba(0,0,0,0));
    color:#fff; font-size:10.5px; font-weight:600; letter-spacing:-0.01em;
    padding:16px 6px 6px; line-height:1.28; text-align:center;
    display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical;
    overflow:hidden; word-break:break-word;
  }
  .data-cell .type-badge{
    position:absolute; top:6px; right:6px;
    width:16px; height:16px; border-radius:50%;
    background:rgba(255,255,255,0.9);
    color:var(--ink);
    display:flex; align-items:center; justify-content:center;
    pointer-events:none;
  }
  .data-cell .type-badge svg{ width:9px; height:9px; stroke:currentColor; fill:none; stroke-width:2.4; stroke-linecap:round; stroke-linejoin:round;}

  /* ============ Weekly progress summary ============ */
  .progress-strip{
    max-width:900px; margin:6px auto 12px;
    padding:0 22px;
    box-sizing:border-box;
    width:100%;
    display:flex; align-items:center; justify-content:space-between; gap:14px;
    flex:none;
  }
  .progress-strip .prog-label{
    font-size:12.5px; color:var(--muted); font-weight:500;
  }
  .progress-strip .prog-label b{
    color:var(--ink); font-weight:700; font-size:14px;
  }
  .progress-strip .prog-bar{
    flex:1; height:6px; background:var(--surface-2); border-radius:999px; overflow:hidden;
  }
  .progress-strip .prog-fill{
    height:100%; background:var(--accent); border-radius:999px;
    transition: width .4s ease;
  }
  .progress-strip .prog-pct{
    font-size:12.5px; font-weight:700; color:var(--ink); font-variant-numeric:tabular-nums;
    min-width:40px; text-align:right;
  }

  /* ============ Empty hint ============ */
  .empty-hint{
    text-align:center; color:var(--muted-2); font-size:12px;
    padding:10px 22px 0;
    font-weight:500;
  }

  /* ============ Sheet / Modal ============ */
  .overlay{
    position:fixed; inset:0; background:rgba(0,0,0,0.42);
    display:none; align-items:flex-end; justify-content:center;
    z-index:60;
    backdrop-filter: blur(2px);
  }
  .overlay.open{ display:flex; }
  .sheet{
    background:var(--canvas);
    width:100%; max-width:520px;
    border-radius:22px 22px 0 0;
    padding:20px 22px calc(24px + env(safe-area-inset-bottom));
    max-height:86vh; overflow-y:auto;
    animation:sheetUp .22s ease-out;
    box-shadow: var(--shadow-2);
  }
  @keyframes sheetUp{
    from{transform:translateY(24px);opacity:0;}
    to{transform:translateY(0);opacity:1;}
  }
  .sheet-handle{
    width:36px; height:4px; background:var(--hairline-strong); border-radius:4px;
    margin:0 auto 16px;
  }
  .sheet-title{
    font-size:17px; font-weight:700; letter-spacing:-0.03em; margin-bottom:4px;
    color:var(--ink);
  }
  .sheet-sub{
    font-size:13px; color:var(--muted); margin-bottom:18px;
    line-height:1.4;
  }
  .sheet-preview{
    width:100%; border-radius:16px; overflow:hidden; margin-bottom:14px;
    background:var(--surface); border:1px solid var(--hairline);
  }
  .sheet-preview img{ width:100%; display:block; max-height:280px; object-fit:cover; }
  .sheet-preview .txt-full{
    padding:16px; font-size:15px; font-weight:500; line-height:1.5; white-space:pre-wrap;
    color:var(--ink);
  }

  textarea.note-input{
    width:100%; min-height:82px; border-radius:14px;
    border:1px solid var(--hairline); background:var(--surface);
    padding:12px 14px; font-size:14.5px; font-weight:450; color:var(--ink);
    resize:vertical; margin-bottom:14px;
    line-height:1.4;
  }
  textarea.note-input:focus{ outline:none; border-color:var(--ink); }

  .segmented{
    display:flex; background:var(--surface-2); border-radius:12px; padding:3px; gap:2px;
    margin-bottom:14px;
  }
  .segmented button{
    flex:1; padding:9px 10px; border:none; background:transparent;
    font-size:13px; font-weight:600; color:var(--muted); cursor:pointer;
    border-radius:9px; letter-spacing:-0.02em;
  }
  .segmented button.active{
    background:var(--surface); color:var(--ink); box-shadow: var(--shadow-1);
  }

  .btn-row{ display:flex; gap:8px; flex-wrap:wrap; margin-bottom:8px; }
  .btn{
    flex:1; min-width:100px;
    border-radius:14px; padding:12px 18px;
    font-weight:600; font-size:14px; letter-spacing:-0.02em;
    border:none; cursor:pointer; text-align:center;
    transition: transform .1s ease;
  }
  .btn:active{ transform:scale(0.97); }
  .btn-primary{ background:var(--ink); color:var(--canvas); }
  .btn-secondary{ background:var(--surface); color:var(--ink); border:1px solid var(--hairline-strong); }
  .btn-danger{ background:transparent; color:var(--danger); border:1px solid var(--danger); }
  .btn-ghost{ background:transparent; color:var(--muted); }
  .btn.full{ flex:1 1 100%; }

  /* Toast */
  .toast{
    position:fixed; left:50%; bottom:24px;
    transform:translateX(-50%) translateY(10px);
    background:var(--ink); color:var(--canvas);
    padding:10px 20px; border-radius:999px;
    font-size:13px; font-weight:600; letter-spacing:-0.02em;
    opacity:0; pointer-events:none;
    transition: opacity .2s ease, transform .2s ease;
    z-index:100; white-space:nowrap;
    box-shadow: var(--shadow-2);
  }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

  /* Category manager */
  .cat-row{
    display:flex; align-items:center; gap:8px; margin-bottom:10px;
    background:var(--surface); border-radius:14px; padding:8px;
    border:1px solid var(--hairline);
  }
  .cat-order{ display:flex; flex-direction:column; gap:2px; }
  .mini-btn{
    width:26px; height:22px; border:none; background:var(--surface-2);
    border-radius:6px; display:flex; align-items:center; justify-content:center;
    cursor:pointer; color:var(--muted);
  }

    display:flex; align-items:center; justify-content:center;
    color:var(--ink);

  .icon-grid button.selected{
    border-color:var(--ink); background:var(--surface-2);

    display:grid; grid-template-columns:repeat(6,1fr); gap:10px; margin-bottom:6px;

    aspect-ratio:1; border-radius:50%; border:2px solid var(--surface);

  .tweaks-fab{

  .t-section{ margin-top:14px; }
  .t-section .t-label{
    font-size:11px; font-weight:700; color:var(--muted); letter-spacing:0.08em;
    text-transform:uppercase; margin-bottom:7px;
  }
  .t-palettes{
    display:grid; grid-template-columns:repeat(5,1fr); gap:6px;
  }
  .t-palette{
    aspect-ratio:1; border-radius:10px; cursor:pointer;
    border:1.5px solid var(--hairline);
    display:flex; overflow:hidden; padding:0;
    position:relative;
  }
  .t-palette.active{ border-color:var(--ink); box-shadow: 0 0 0 1.5px var(--ink) inset; }
  .t-palette span{ flex:1; height:100%; display:block; }
  .t-chips{ display:flex; gap:6px; flex-wrap:wrap; }
  .t-chip{
    padding:7px 12px; border-radius:999px;
    border:1px solid var(--hairline-strong); background:var(--surface);
    font-size:12px; font-weight:600; color:var(--ink-soft); cursor:pointer;
    letter-spacing:-0.02em;
  }
  .t-chip.active{
    background:var(--ink); color:var(--canvas); border-color:var(--ink);
  }

  /* ============ Landscape phone ============ */
  @media (orientation:landscape) and (max-height:520px){
    body{ padding-bottom:24px; }
    .topbar{ padding:12px 22px 4px; }
    .week-nav{ padding:6px 22px 6px; }
    .week-tools{ margin-bottom:4px; }
    .grid-wrap{ padding:0 20px; gap:5px; }
    .cat-col{ width:52px; gap:5px; }
    .days-inner{ gap:5px; }
    .days-row{ gap:5px; }
    .head-cell{ width:64px; height:30px; font-size:11px; border-radius:8px; }
    .head-cell .day-num{ font-size:11.5px; }
    .head-corner{ height:30px; }
    .cat-cell{ height:64px; font-size:11.5px; border-radius:11px; padding:4px; }
    .data-cell{ width:64px; height:64px; border-radius:11px; }
    .sheet{ max-height:92vh; padding:14px 22px calc(16px + env(safe-area-inset-bottom)); }
    .sheet-preview img{ max-height:34vh; }
  }

  /* ============ Tablet: bigger cells ============ */
  @media (min-width:720px){
    body{ font-size:calc(15.5px * var(--font-scale)); }
    .head-cell, .data-cell{ width:88px; height:88px; }
    .head-cell{ height:42px; }
    .head-corner{ height:42px; }
    .cat-cell{ height:88px; }
    .cat-col{ width:76px; }
    .grid-wrap{ padding:0 24px; gap:8px; }
    .days-inner{ gap:8px; }
    .days-row{ gap:8px; }
  }

  /* Long-press indicator */
  .data-cell.pressing::after{
    content:''; position:absolute; inset:0;
    border-radius:inherit;
    box-shadow: inset 0 0 0 2px var(--ink);
    animation: pressPulse .5s ease-out forwards;
    pointer-events:none;
  }
  @keyframes pressPulse{
    0%{ opacity:0; }
    100%{ opacity:0.9; }
  }
</style>

    </div>
    <div class="t-section">
      <div class="t-label">Category label</div>
      <div class="t-chips" id="tCatMode">
        <button class="t-chip" data-mode="both">Icon + dot</button>
        <button class="t-chip" data-mode="icon">Icon only</button>
        <button class="t-chip" data-mode="dot">Dot only</button>
      </div>
    </div>
    <div class="t-section">
      <div class="t-label">Font size</div>
      <div class="t-chips" id="tFont">
        <button class="t-chip" data-font="0.92">Small</button>
        <button class="t-chip" data-font="1">Regular</button>
        <button class="t-chip" data-font="1.1">Large</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

<script>
(function(){
  // ============ Storage & state ============
  const STORAGE_KEY = 'weeklymin_v2';
  const TWEAKS_KEY = 'weeklymin_tweaks_v2';
  const DAY_LABELS_MON = ['월','화','수','목','금','토','일'];
  const DAY_LABELS_SUN = ['일','월','화','수','목','금','토'];

  const CAT_COLORS = [
    /* neutrals */ '#111111', '#4A4A48', '#6B7280', '#8B8378',
    /* red·pink */ '#B4361B', '#D64B6E', '#C2185B', '#E8707E',
    /* orange·yellow */ '#CF4500', '#E07A2F', '#E8A72B', '#C9A227',
    /* green */ '#3A5A40', '#5B8C5A', '#7FA65A', '#556B2F',
    /* teal */ '#4B7C6F', '#2A7F7F', '#3E8E9E', '#1F6F8B',
    /* blue */ '#2E70A8', '#3E64C8', '#5A7FD6', '#274690',
    /* purple */ '#7C6BE8', '#8E5AA8', '#6A4C93', '#A47FD6',
    /* brown·earth */ '#8B5A2B', '#A0703C', '#6E4E2E', '#9C6644',
    /* deep */ '#1F1B15', '#0F4C5C', '#823038', '#37306B'
  ];
  const ICONS = ['🔖','📝','💪','📚','💧','🏃','😴','🍎','🎯','✅','🎨','🎵','💼','🧘','🌱','💰','🚭','🧹','☕','🌙','🌤','🚶','📖','🍽','🧠','❤️'];

  // 대한민국 공휴일(2026년 기준, 대체공휴일 포함). 매년 날짜가 바뀌므로
  // (특히 설날·추석 등 음력 명절) 해가 바뀌면 이 목록을 직접 갱신해야 해요.
  const HOLIDAYS_KR = {
    '2026-01-01': '신정',
    '2026-02-16': '설날 연휴',
    '2026-02-17': '설날',
    '2026-02-18': '설날 연휴',
    '2026-03-01': '삼일절',
    '2026-03-02': '대체공휴일(삼일절)',
    '2026-05-01': '노동절',
    '2026-05-05': '어린이날',
    '2026-05-24': '부처님오신날',
    '2026-05-25': '대체공휴일(부처님오신날)',
    '2026-06-06': '현충일',
    '2026-07-17': '제헌절',
    '2026-08-15': '광복절',
    '2026-08-17': '대체공휴일(광복절)',
    '2026-09-24': '추석 연휴',
    '2026-09-25': '추석',
    '2026-09-26': '추석 연휴',
    '2026-10-03': '개천절',
    '2026-10-05': '대체공휴일(개천절)',
    '2026-10-09': '한글날',
    '2026-12-25': '성탄절'
  };

  const PALETTES = [
    { id:'mono',   name:'Mono',   swatches:['#FAFAF9','#111111','#7A7874'] },
    { id:'beige',  name:'Beige',  swatches:['#F3F0EA','#1F1B15','#CF4500'] },
    { id:'paper',  name:'Paper',  swatches:['#F5F1EA','#26241E','#3A5A40'] },
    { id:'pastel', name:'Pastel', swatches:['#F6F3F8','#2A2432','#7C6BE8'] },
    { id:'dark',   name:'Dark',   swatches:['#0F0F0E','#F5F4F1','#8E8C87'] }
  ];

  function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

  function defaultState(){
    return {
      weekStart: 1, // 1=Mon, 0=Sun
      categories: [
        {id: uid(), name:'운동',   icon:'💪', color:'#CF4500'},
        {id: uid(), name:'독서',   icon:'📚', color:'#3A5A40'},
        {id: uid(), name:'물',     icon:'💧', color:'#2E70A8'},
        {id: uid(), name:'명상',   icon:'🧘', color:'#7C6BE8'}
      ],
      entries: {}
    };
  }
  function defaultTweaks(){
    return { palette:'mono', cellShape:'rounded', catMode:'both', font:1 };
  }

  function safeParse(raw, fallback){
    try{ return raw ? JSON.parse(raw) : fallback; } catch(e){ return fallback; }
  }
  function migrateV1(){
    // One-time migration from the old app version (weeklyRecordApp_v1)
    const old = safeParse(localStorage.getItem('weeklyRecordApp_v1'), null);
    if(!old || !old.categories || !old.entries) return null;
    const cats = old.categories.map((c, i) => ({
      id: c.id || uid(),
      name: c.name || `카테고리${i+1}`,
      icon: c.icon || '🔖',
      color: CAT_COLORS[i % CAT_COLORS.length]
    }));
    const entries = {};
    Object.keys(old.entries).forEach(k => {
      const parts = k.split('__'); // mondayIso __ catId __ dayIdx
      if(parts.length !== 3) return;
      const [mondayIso, catId, dayIdxStr] = parts;
      const dayIdx = parseInt(dayIdxStr, 10);
      if(!/^\d{4}-\d{2}-\d{2}$/.test(mondayIso) || isNaN(dayIdx)) return;
      const d = new Date(mondayIso + 'T00:00:00');
      d.setDate(d.getDate() + dayIdx);
      const e = old.entries[k] || {};
      const photo = e.photo || (e.type === 'photo' ? e.content : null);
      const text = e.text || (e.type === 'text' ? e.content : null);
      if(!photo && !text) return;
      entries[`${isoDate(d)}__${catId}`] = { done:false, photo: photo || null, text: text || null };
    });
    return { weekStart: 1, categories: cats, entries };
  }

  function loadState(){
    const parsed = safeParse(localStorage.getItem(STORAGE_KEY), null);
    if(!parsed || !parsed.categories || !parsed.entries){
      const migrated = migrateV1();
      if(migrated){
        try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(migrated)); }catch(e){}
        return migrated;
      }
      return defaultState();
    }
    if(typeof parsed.weekStart !== 'number') parsed.weekStart = 1;
    // ensure every category has a color
    parsed.categories.forEach((c, i) => { if(!c.color) c.color = CAT_COLORS[i % CAT_COLORS.length]; });
    return parsed;
  }
  function loadTweaks(){
    return Object.assign(defaultTweaks(), safeParse(localStorage.getItem(TWEAKS_KEY), {}));
  }

  let state = loadState();
  let tweaks = loadTweaks();

  function saveState(silent){
    try{
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      if(!silent) showToast('저장됨');
    }catch(e){
      alert('저장 공간이 부족합니다. 사진을 일부 삭제해주세요.');
    }
  }
  function saveTweaks(){
    try{ localStorage.setItem(TWEAKS_KEY, JSON.stringify(tweaks)); }catch(e){}
  }

  // ============ Toast ============
  let toastTimer = null;
  function showToast(msg){
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 1400);
  }

  // ============ Date helpers ============
  function getWeekStart(d){
    const dt = new Date(d);
    dt.setHours(0,0,0,0);
    const day = dt.getDay(); // 0=Sun..6=Sat
    const start = state.weekStart; // 1=Mon, 0=Sun
    const diff = ((day - start) + 7) % 7;
    dt.setDate(dt.getDate() - diff);
    return dt;
  }
  function isoDate(d){
    const y = d.getFullYear();
    const m = String(d.getMonth()+1).padStart(2,'0');
    const day = String(d.getDate()).padStart(2,'0');
    return `${y}-${m}-${day}`;
  }
  function currentDayLabels(){
    return state.weekStart === 1 ? DAY_LABELS_MON : DAY_LABELS_SUN;
  }

  let currentWeekStart = getWeekStart(new Date());
  let realWeekStart = getWeekStart(new Date());

  function weekInfo(monday){
    const year = monday.getFullYear();
    const month = monday.getMonth();
    const firstOfMonth = new Date(year, month, 1);
    const wsFirst = getWeekStart(firstOfMonth);
    // week number of month based on which week-start-window contains this Monday
    const diffDays = Math.round((monday - wsFirst) / (1000*60*60*24));
    const weekNum = Math.floor(diffDays / 7) + 1;
    return { year, month: month+1, weekNum };
  }

  const WEEKDAY_KR = ['일','월','화','수','목','금','토'];

  function renderHolidayBanner(){
    const banner = document.getElementById('holidayBanner');
    const items = [];
    for(let i = 0; i < 7; i++){
      const d = new Date(currentWeekStart);
      d.setDate(d.getDate() + i);
      const name = HOLIDAYS_KR[isoDate(d)];
      if(name){
        items.push(
          `<span class="holiday-item"><span class="holiday-date">${d.getMonth()+1}/${d.getDate()}(${WEEKDAY_KR[d.getDay()]})</span>${escapeHtml(name)}</span>`
        );
      }
    }
    if(items.length){
      banner.innerHTML = items.join('');
      banner.classList.add('show');
    }else{
      banner.innerHTML = '';
      banner.classList.remove('show');
    }
  }

  function renderWeekLabel(){
    realWeekStart = getWeekStart(new Date());
    const info = weekInfo(currentWeekStart);
    const isThisWeek = isoDate(currentWeekStart) === isoDate(realWeekStart);
    const label = document.getElementById('weekLabel');
    label.innerHTML =
      `${info.year}년 ${info.month}월 ${info.weekNum}주차` +
      (isThisWeek ? ' <span class="this-week-badge">NOW</span>' : '');
    document.getElementById('jumpTodayBtn').classList.toggle('show', !isThisWeek);
    renderHolidayBanner();
  }

  // ============ Entries model ============
  // Entry shape: { done: bool, photo: dataUrl|null, text: string|null }
  function entryKey(catId, dateIso){
    return `${dateIso}__${catId}`;
  }
  function getEntry(catId, dateIso){
    return state.entries[entryKey(catId, dateIso)] || null;
  }
  function isDone(e){ return !!(e && (e.done || e.photo || e.text)); }

  // ============ Grid render ============
  function renderGrid(){
    const catCol = document.getElementById('catCol');
    const daysInner = document.getElementById('daysInner');
    catCol.innerHTML = '';
    daysInner.innerHTML = '';

    const todayIso = isoDate(new Date(new Date().setHours(0,0,0,0)));

    // Category column: corner spacer + cells
    const corner = document.createElement('div');
    corner.className = 'head-corner';
    catCol.appendChild(corner);
    state.categories.forEach(cat => {
      const c = document.createElement('div');
      c.className = 'cat-cell';
      c.style.setProperty('--cat-color', cat.color);
      c.innerHTML = `<span class="cat-dot"></span><span class="cat-icon">${escapeHtml(cat.icon || '🔖')}</span><span class="cat-name">${escapeHtml(cat.name)}</span>`;
      c.addEventListener('click', () => {
        // clicking category opens heatmap for it
        openHeatmap(cat.id);
      });
      catCol.appendChild(c);
    });

    // Days header
    const labels = currentDayLabels();
    const headRow = document.createElement('div');
    headRow.className = 'days-row';
    labels.forEach((label, i) => {
      const cellDate = new Date(currentWeekStart);
      cellDate.setDate(cellDate.getDate() + i);
      const dateIso = isoDate(cellDate);
      const isToday = dateIso === todayIso;
      const dayNum = cellDate.getDate();
      const weekendClass = label === '토' ? ' sat' : (label === '일' ? ' sun' : '');
      const holidayName = HOLIDAYS_KR[dateIso];
      const h = document.createElement('div');
      h.className = 'head-cell' + (isToday ? ' today' : '') + weekendClass + (holidayName ? ' holiday' : '');
      if(holidayName) h.title = holidayName;
      h.innerHTML = `<span>${label}</span><span class="day-num">${dayNum}</span>` +
        (holidayName ? '<span class="holiday-dot"></span>' : '');
      headRow.appendChild(h);
    });
    daysInner.appendChild(headRow);

    // Rows
    let doneCount = 0;
    const totalCount = state.categories.length * 7;

    state.categories.forEach(cat => {
      const row = document.createElement('div');
      row.className = 'days-row';

      labels.forEach((label, dayIdx) => {
        const cellDate = new Date(currentWeekStart);
        cellDate.setDate(cellDate.getDate() + dayIdx);
        const dateIso = isoDate(cellDate);
        const isToday = dateIso === todayIso;
        const isWeekend = (label === '토' || label === '일');
        const entry = getEntry(cat.id, dateIso);

        const cellDiv = document.createElement('div');
        cellDiv.className = 'data-cell'
          + (isToday ? ' today-col' : '')
          + (isWeekend ? ' weekend-col' : '');

        const photo = entry && entry.photo;
        const text = entry && entry.text;
        const done = entry && entry.done;

        if(photo){
          cellDiv.innerHTML = `<img src="${photo}" alt="">` +
            (text ? `<div class="cell-text-overlay">${escapeHtml(text)}</div>` : '') +
            `<div class="type-badge"><svg viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg></div>`;
        }else if(text){
          cellDiv.innerHTML = `<div class="txt-preview">${escapeHtml(text)}</div>`;
        }else if(done){
          cellDiv.classList.add('filled-check');
          cellDiv.style.setProperty('--check-fill', cat.color);
        }else{
          cellDiv.innerHTML = '';
        }

        if(isDone(entry)) doneCount++;

        attachCellInteractions(cellDiv, cat, dateIso, dayIdx);
        row.appendChild(cellDiv);
      });

      daysInner.appendChild(row);
    });

    // Progress
    const pct = totalCount === 0 ? 0 : Math.round((doneCount / totalCount) * 100);
    document.getElementById('progDone').textContent = doneCount;
    document.getElementById('progTotal').textContent = totalCount;
    document.getElementById('progPct').textContent = pct + '%';
    document.getElementById('progFill').style.width = pct + '%';
  }

  function escapeHtml(str){
    if(str == null) return '';
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  // ============ Cell interactions: tap = open sheet, long press = toggle check ============
  const LONG_PRESS_MS = 380;
  function attachCellInteractions(cellDiv, cat, dateIso, dayIdx){
    let pressTimer = null;
    let longFired = false;
    let moved = false;
    let startX = 0, startY = 0;

    const start = (ev) => {
      longFired = false;
      moved = false;
      const pt = ev.touches ? ev.touches[0] : ev;
      startX = pt.clientX; startY = pt.clientY;
      cellDiv.classList.add('pressing');
      pressTimer = setTimeout(() => {
        longFired = true;
        cellDiv.classList.remove('pressing');
        if(navigator.vibrate) navigator.vibrate(12);
        openCellSheet(cat, dateIso, dayIdx);
      }, LONG_PRESS_MS);
    };
    const move = (ev) => {
      if(moved) return;
      const pt = ev.touches ? ev.touches[0] : ev;
      if(Math.abs(pt.clientX - startX) > 8 || Math.abs(pt.clientY - startY) > 8){
        moved = true;
        clearTimeout(pressTimer);
        cellDiv.classList.remove('pressing');
      }
    };
    const end = (ev) => {
      clearTimeout(pressTimer);
      cellDiv.classList.remove('pressing');
      if(!longFired && !moved){
        toggleDone(cat, dateIso);
      }
    };
    const cancel = () => {
      moved = true;
      clearTimeout(pressTimer);
      cellDiv.classList.remove('pressing');
    };

    cellDiv.addEventListener('touchstart', start, {passive:true});
    cellDiv.addEventListener('touchmove', move, {passive:true});
    cellDiv.addEventListener('touchend', end);
    cellDiv.addEventListener('touchcancel', cancel);

    // Pointer/mouse fallback (desktop)
    cellDiv.addEventListener('mousedown', (ev) => {
      start(ev);
      const onMove = (mv) => move(mv);
      const onUp = (up) => {
        end(up);
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
      };
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });
    // Prevent context menu on long-press desktop
    cellDiv.addEventListener('contextmenu', (e) => e.preventDefault());
  }

  function toggleDone(cat, dateIso){
    const key = entryKey(cat.id, dateIso);
    const cur = state.entries[key];
    if(cur && (cur.photo || cur.text)){
      // If there's rich content, tapping opens the sheet instead of toggling
      const idx = currentDayLabels().findIndex((_,i) => {
        const d = new Date(currentWeekStart); d.setDate(d.getDate()+i);
        return isoDate(d) === dateIso;
      });
      openCellSheet(cat, dateIso, idx);
      return;
    }
    if(cur && cur.done){
      delete state.entries[key];
    }else{
      state.entries[key] = { done:true, photo:null, text:null };
      if(navigator.vibrate) navigator.vibrate(10);
    }
    saveState(true);
    renderGrid();
  }

  // ============ Cell sheet ============
  const cellOverlay = document.getElementById('cellOverlay');
  const cellSheetTitle = document.getElementById('cellSheetTitle');
  const cellSheetSub = document.getElementById('cellSheetSub');
  const cellPreviewWrap = document.getElementById('cellPreviewWrap');
  const noteInput = document.getElementById('noteInput');
  const fileInput = document.getElementById('fileInput');

  let activeCat = null, activeDateIso = null, activeDayIdx = null;

  function openCellSheet(cat, dateIso, dayIdx){
    activeCat = cat; activeDateIso = dateIso; activeDayIdx = dayIdx;
    const key = entryKey(cat.id, dateIso);
    const entry = state.entries[key];
    const photo = entry && entry.photo;
    const text = entry && entry.text;
    const [y,m,d] = dateIso.split('-');
    const labels = currentDayLabels();
    cellSheetTitle.textContent = `${cat.icon || ''} ${cat.name} · ${parseInt(m,10)}월 ${parseInt(d,10)}일 ${labels[dayIdx]}요일`;
    cellSheetSub.textContent = '완료 표시, 사진, 문구를 함께 저장할 수 있어요';
    noteInput.value = text || '';
    cellPreviewWrap.innerHTML = '';

    if(photo){
      cellPreviewWrap.innerHTML = `
        <div class="sheet-preview"><img src="${photo}" alt=""></div>
        <button class="btn btn-ghost" id="removePhotoBtn" style="width:100%;margin:-8px 0 12px;padding:6px;font-size:13px;">사진만 제거</button>`;
      document.getElementById('removePhotoBtn').addEventListener('click', () => {
        const cur = state.entries[key];
        const curText = cur && cur.text;
        const curDone = cur && cur.done;
        if(curText || curDone){ state.entries[key] = { done: !!curDone, photo:null, text: curText || null }; }
        else{ delete state.entries[key]; }
        saveState(true); renderGrid(); openCellSheet(activeCat, activeDateIso, activeDayIdx);
      });
    }

    document.getElementById('clearCellBtn').style.display = (photo || text || (entry && entry.done)) ? 'block' : 'none';
    cellOverlay.classList.add('open');
  }

  function closeCellSheet(){
    cellOverlay.classList.remove('open');
    activeCat = null; activeDateIso = null; activeDayIdx = null;
  }

  document.getElementById('closeCellBtn').addEventListener('click', closeCellSheet);
  cellOverlay.addEventListener('click', (e) => { if(e.target === cellOverlay) closeCellSheet(); });

  document.getElementById('saveTextBtn').addEventListener('click', () => {
    if(!activeCat) return;
    const key = entryKey(activeCat.id, activeDateIso);
    const text = noteInput.value.trim();
    const cur = state.entries[key] || {};
    const photo = cur.photo || null;
    // Save always marks as done (has content)
    state.entries[key] = { done:true, photo, text: text || null };
    if(!text && !photo){
      // Just mark done
      state.entries[key] = { done:true, photo:null, text:null };
    }
    saveState(); renderGrid(); closeCellSheet();
  });

  document.getElementById('clearCellBtn').addEventListener('click', () => {
    if(!activeCat) return;
    const key = entryKey(activeCat.id, activeDateIso);
    delete state.entries[key];
    saveState(); renderGrid(); closeCellSheet();
  });

  document.getElementById('pickPhotoBtn').addEventListener('click', () => fileInput.click());

  fileInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if(!file || !activeCat) return;
    compressImage(file).then(dataUrl => {
      const key = entryKey(activeCat.id, activeDateIso);
      const cur = state.entries[key] || {};
      const text = noteInput.value.trim() || cur.text || null;
      state.entries[key] = { done:true, photo:dataUrl, text };
      saveState(); renderGrid();
      openCellSheet(activeCat, activeDateIso, activeDayIdx);
    }).catch(() => alert('사진을 불러오지 못했습니다.'));
    fileInput.value = '';
  });

  function compressImage(file, maxDim = 720, quality = 0.75){
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          let { width, height } = img;
          if(width > height){ if(width > maxDim){ height = height * maxDim / width; width = maxDim; } }
          else { if(height > maxDim){ width = width * maxDim / height; height = maxDim; } }
          const canvas = document.createElement('canvas');
          canvas.width = width; canvas.height = height;
          canvas.getContext('2d').drawImage(img, 0, 0, width, height);
          resolve(canvas.toDataURL('image/jpeg', quality));
        };
        img.onerror = reject;
        img.src = e.target.result;
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  // ============ Week navigation ============
  document.getElementById('prevWeek').addEventListener('click', () => {
    currentWeekStart = new Date(currentWeekStart);
    currentWeekStart.setDate(currentWeekStart.getDate() - 7);
    renderWeekLabel(); renderGrid();
  });
  document.getElementById('nextWeek').addEventListener('click', () => {
    currentWeekStart = new Date(currentWeekStart);
    currentWeekStart.setDate(currentWeekStart.getDate() + 7);
    renderWeekLabel(); renderGrid();
  });
  document.getElementById('weekLabel').addEventListener('click', () => {
    currentWeekStart = getWeekStart(new Date());
    renderWeekLabel(); renderGrid();
  });
  document.getElementById('jumpTodayBtn').addEventListener('click', () => {
    currentWeekStart = getWeekStart(new Date());
    renderWeekLabel(); renderGrid();
  });
  const datePicker = document.getElementById('datePicker');
  const primeDatePicker = () => { datePicker.value = isoDate(currentWeekStart); };
  datePicker.addEventListener('focus', primeDatePicker);
  datePicker.addEventListener('click', primeDatePicker);
  datePicker.addEventListener('change', (e) => {
    if(!e.target.value) return;
    const picked = new Date(e.target.value + 'T00:00:00');
    currentWeekStart = getWeekStart(picked);
    renderWeekLabel(); renderGrid();
  });

  // ============ Settings ============
  const settingsOverlay = document.getElementById('settingsOverlay');
  const catList = document.getElementById('catList');

  function renderWeekStartUI(){
    document.querySelectorAll('#weekStartRow .radio-chip').forEach(b => {
      b.classList.toggle('active', parseInt(b.dataset.weekStart,10) === state.weekStart);
    });
  }
  document.getElementById('weekStartRow').addEventListener('click', (e) => {
    const btn = e.target.closest('.radio-chip'); if(!btn) return;
    state.weekStart = parseInt(btn.dataset.weekStart, 10);
    currentWeekStart = getWeekStart(new Date(currentWeekStart));
    saveState(true);
    renderWeekStartUI();
    renderWeekLabel(); renderGrid();
  });

  function renderCatList(){
    catList.innerHTML = '';
    state.categories.forEach((cat, idx) => {
      const row = document.createElement('div');
      row.className = 'cat-row';
      row.innerHTML = `
        <div class="cat-order">
          <button class="mini-btn" data-act="up" data-idx="${idx}" ${idx===0?'disabled':''} aria-label="위로">
            <svg viewBox="0 0 24 24"><path d="M18 15l-6-6-6 6"/></svg>
          </button>
          <button class="mini-btn" data-act="down" data-idx="${idx}" ${idx===state.categories.length-1?'disabled':''} aria-label="아래로">
            <svg viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg>
          </button>
        </div>
        <button class="icon-pick-btn" data-act="icon" data-idx="${idx}" type="button">${escapeHtml(cat.icon || '🔖')}</button>
        <button class="color-pick-btn" data-act="color" data-idx="${idx}" style="--dot-color:${cat.color}" aria-label="색상"></button>
        <input type="text" class="name-input" data-idx="${idx}" value="${escapeHtml(cat.name)}" maxlength="12">
        <button class="del-btn" data-act="del" data-idx="${idx}" aria-label="삭제">
          <svg viewBox="0 0 24 24"><path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
        </button>
      `;
      catList.appendChild(row);
    });
  }

  catList.addEventListener('click', (e) => {
    const btn = e.target.closest('button');
    if(!btn) return;
    const idx = parseInt(btn.dataset.idx, 10);
    const act = btn.dataset.act;
    if(act === 'up' && idx > 0){
      [state.categories[idx-1], state.categories[idx]] = [state.categories[idx], state.categories[idx-1]];
    }else if(act === 'down' && idx < state.categories.length-1){
      [state.categories[idx+1], state.categories[idx]] = [state.categories[idx], state.categories[idx+1]];
    }else if(act === 'icon'){
      iconTarget = { type:'existing', idx };
      renderIconGrid(state.categories[idx].icon);
      iconOverlay.classList.add('open');
      return;
    }else if(act === 'color'){
      colorTarget = { type:'existing', idx };
      renderColorGrid(state.categories[idx].color);
      colorOverlay.classList.add('open');
      return;
    }else if(act === 'del'){
      if(state.categories.length <= 1){ alert('카테고리는 최소 1개 이상 필요합니다.'); return; }
      if(confirm('이 카테고리와 관련 기록을 모두 삭제할까요?')){
        const removedId = state.categories[idx].id;
        state.categories.splice(idx, 1);
        Object.keys(state.entries).forEach(k => { if(k.endsWith('__'+removedId)) delete state.entries[k]; });
      }else return;
    }else return;
    saveState(true); renderCatList(); renderGrid();
  });

  catList.addEventListener('change', (e) => {
    if(e.target.tagName !== 'INPUT') return;
    const idx = parseInt(e.target.dataset.idx, 10);
    const val = e.target.value.trim();
    if(!val){ e.target.value = state.categories[idx].name; return; }
    state.categories[idx].name = val;
    saveState(true); renderGrid();
  });

  document.getElementById('addCatBtn').addEventListener('click', () => {
    const input = document.getElementById('newCatInput');
    const val = input.value.trim();
    if(!val) return;
    const usedColors = state.categories.map(c => c.color);
    const nextColor = CAT_COLORS.find(c => !usedColors.includes(c)) || CAT_COLORS[state.categories.length % CAT_COLORS.length];
    state.categories.push({ id: uid(), name: val, icon: newCatIcon, color: nextColor });
    input.value = '';
    newCatIcon = '🔖';
    document.getElementById('newCatIconBtn').textContent = newCatIcon;
    saveState(true); renderCatList(); renderGrid();
  });
  document.getElementById('newCatInput').addEventListener('keydown', (e) => {
    if(e.key === 'Enter') document.getElementById('addCatBtn').click();
  });

  document.getElementById('openSettings').addEventListener('click', () => {
    renderWeekStartUI();
    renderCatList();
    settingsOverlay.classList.add('open');
    document.getElementById('tweaksFab').classList.add('hide-fab');
  });
  document.getElementById('closeSettingsBtn').addEventListener('click', () => {
    settingsOverlay.classList.remove('open');
    document.getElementById('tweaksFab').classList.remove('hide-fab');
  });
  settingsOverlay.addEventListener('click', (e) => {
    if(e.target === settingsOverlay){
      settingsOverlay.classList.remove('open');
      document.getElementById('tweaksFab').classList.remove('hide-fab');
    }
  });

  // ============ Icon picker ============
  const iconOverlay = document.getElementById('iconOverlay');
  const iconGrid = document.getElementById('iconGrid');
  let iconTarget = null;
  let newCatIcon = '🔖';

  function renderIconGrid(currentIcon){
    iconGrid.innerHTML = '';
    ICONS.forEach(ic => {
      const b = document.createElement('button');
      b.type = 'button';
      b.textContent = ic;
      if(ic === currentIcon) b.classList.add('selected');
      b.addEventListener('click', () => {
        if(iconTarget && iconTarget.type === 'new'){
          newCatIcon = ic;
          document.getElementById('newCatIconBtn').textContent = ic;
        }else if(iconTarget && iconTarget.type === 'existing'){
          state.categories[iconTarget.idx].icon = ic;
          saveState(true); renderCatList(); renderGrid();
        }
        iconOverlay.classList.remove('open');
      });
      iconGrid.appendChild(b);
    });
  }
  document.getElementById('newCatIconBtn').addEventListener('click', () => {
    iconTarget = { type:'new' };
    renderIconGrid(newCatIcon);
    iconOverlay.classList.add('open');
  });
  document.getElementById('closeIconBtn').addEventListener('click', () => iconOverlay.classList.remove('open'));
  iconOverlay.addEventListener('click', (e) => { if(e.target === iconOverlay) iconOverlay.classList.remove('open'); });

  // ============ Color picker ============
  const colorOverlay = document.getElementById('colorOverlay');
  const colorGrid = document.getElementById('colorGrid');
  let colorTarget = null;

  function renderColorGrid(currentColor){
    colorGrid.innerHTML = '';
    CAT_COLORS.forEach(col => {
      const b = document.createElement('button');
      b.type = 'button';
      b.style.background = col;
      if(col === currentColor) b.classList.add('selected');
      b.addEventListener('click', () => {
        applyPickedColor(col);
      });
      colorGrid.appendChild(b);
    });
    // custom swatch: show the current color if it's not one of the presets
    const swatch = document.getElementById('customColorSwatch');
    if(currentColor && !CAT_COLORS.includes(currentColor)){
      swatch.classList.add('solid');
      swatch.style.setProperty('--custom-swatch', currentColor);
    }else{
      swatch.classList.remove('solid');
      swatch.style.removeProperty('--custom-swatch');
    }
  }

  function applyPickedColor(col){
    if(colorTarget && colorTarget.type === 'existing'){
      state.categories[colorTarget.idx].color = col;
      saveState(true); renderCatList(); renderGrid();
    }
    colorOverlay.classList.remove('open');
  }

  const customColorInput = document.getElementById('customColorInput');
  const primeCustomColor = () => {
    const cur = (colorTarget && colorTarget.type === 'existing') ? state.categories[colorTarget.idx].color : '#888888';
    if(/^#[0-9a-fA-F]{6}$/.test(cur)) customColorInput.value = cur;
  };
  customColorInput.addEventListener('focus', primeCustomColor);
  customColorInput.addEventListener('click', primeCustomColor);
  customColorInput.addEventListener('change', (e) => {
    applyPickedColor(e.target.value);
  });
  document.getElementById('closeColorBtn').addEventListener('click', () => colorOverlay.classList.remove('open'));
  colorOverlay.addEventListener('click', (e) => { if(e.target === colorOverlay) colorOverlay.classList.remove('open'); });

  // ============ Heatmap ============
  const heatOverlay = document.getElementById('heatOverlay');
  let heatCatId = null;

  function openHeatmap(catId){
    heatCatId = catId || state.categories[0].id;
    renderHeatmap();
    heatOverlay.classList.add('open');
    document.getElementById('tweaksFab').classList.add('hide-fab');
  }
  document.getElementById('openHeatmap').addEventListener('click', () => openHeatmap());
  document.getElementById('closeHeatBtn').addEventListener('click', () => {
    heatOverlay.classList.remove('open');
    document.getElementById('tweaksFab').classList.remove('hide-fab');
  });
  heatOverlay.addEventListener('click', (e) => {
    if(e.target === heatOverlay){
      heatOverlay.classList.remove('open');
      document.getElementById('tweaksFab').classList.remove('hide-fab');
    }
  });

  function renderHeatmap(){
    const selector = document.getElementById('heatSelector');
    selector.innerHTML = '';
    state.categories.forEach(cat => {
      const chip = document.createElement('button');
      chip.className = 'heat-chip' + (cat.id === heatCatId ? ' active' : '');
      chip.innerHTML = `<span class="h-dot" style="--dot-color:${cat.color}"></span>${escapeHtml(cat.icon || '')} ${escapeHtml(cat.name)}`;
      chip.addEventListener('click', () => { heatCatId = cat.id; renderHeatmap(); });
      selector.appendChild(chip);
    });

    const cat = state.categories.find(c => c.id === heatCatId) || state.categories[0];
    if(!cat) return;

    // Collect all dates with entries for this cat
    const doneDates = new Set();
    Object.keys(state.entries).forEach(k => {
      if(k.endsWith('__' + cat.id)){
        const entry = state.entries[k];
        if(isDone(entry)){
          const date = k.split('__')[0];
          doneDates.add(date);
        }
      }
    });

    // Stats: total, this-month, streak
    const todayIso = isoDate(new Date(new Date().setHours(0,0,0,0)));
    const now = new Date();
    const thisMonthPrefix = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
    let thisMonthCount = 0;
    doneDates.forEach(d => { if(d.startsWith(thisMonthPrefix)) thisMonthCount++; });

    // Current streak: count backwards from today
    let streak = 0;
    let cursor = new Date();
    cursor.setHours(0,0,0,0);
    while(doneDates.has(isoDate(cursor))){
      streak++;
      cursor.setDate(cursor.getDate() - 1);
    }
    // If today isn't done yet, allow streak to still count from yesterday if yesterday done
    if(streak === 0){
      const yest = new Date(); yest.setHours(0,0,0,0); yest.setDate(yest.getDate()-1);
      let c = new Date(yest);
      while(doneDates.has(isoDate(c))){
        streak++;
        c.setDate(c.getDate()-1);
      }
    }

    // Longest streak
    let longest = 0;
    const sortedDates = Array.from(doneDates).sort();
    let runLen = 0, prev = null;
    sortedDates.forEach(ds => {
      if(prev){
        const d1 = new Date(prev + 'T00:00:00');
        const d2 = new Date(ds + 'T00:00:00');
        const diff = Math.round((d2 - d1) / (1000*60*60*24));
        if(diff === 1){ runLen++; }
        else{ if(runLen > longest) longest = runLen; runLen = 1; }
      }else{ runLen = 1; }
      prev = ds;
    });
    if(runLen > longest) longest = runLen;

    document.getElementById('heatStats').innerHTML = `
      <div class="heat-stat"><div class="s-val">${doneDates.size}</div><div class="s-lab">전체 기록</div></div>
      <div class="heat-stat"><div class="s-val">${thisMonthCount}</div><div class="s-lab">이번달</div></div>
      <div class="heat-stat"><div class="s-val">${streak}</div><div class="s-lab">현재 연속</div></div>
      <div class="heat-stat"><div class="s-val">${longest}</div><div class="s-lab">최장 연속</div></div>
    `;

    // Render last 3 months
    const heatBody = document.getElementById('heatBody');
    heatBody.innerHTML = '';
    const monthCursor = new Date(now.getFullYear(), now.getMonth(), 1);
    const months = [];
    for(let i=0; i<3; i++){
      months.push(new Date(monthCursor));
      monthCursor.setMonth(monthCursor.getMonth() - 1);
    }
    // Reverse so oldest first? Show newest first (top).
    months.forEach(mDate => {
      const y = mDate.getFullYear(), mo = mDate.getMonth();
      const monthPrefix = `${y}-${String(mo+1).padStart(2,'0')}`;
      let count = 0;
      doneDates.forEach(d => { if(d.startsWith(monthPrefix)) count++; });

      const wrap = document.createElement('div');
      wrap.className = 'heat-month';
      wrap.innerHTML = `
        <div class="heat-month-header">
          <div class="m-title">${y}년 ${mo+1}월</div>
          <div class="m-count">${count}일 기록</div>
        </div>
        <div class="heat-grid"></div>
      `;
      const grid = wrap.querySelector('.heat-grid');

      const firstOfMonth = new Date(y, mo, 1);
      const daysInMonth = new Date(y, mo+1, 0).getDate();
      // Leading empties: align first day-of-week according to weekStart
      const startOffset = ((firstOfMonth.getDay() - state.weekStart) + 7) % 7;
      for(let i=0; i<startOffset; i++){
        const cell = document.createElement('div');
        cell.className = 'heat-day dim';
        grid.appendChild(cell);
      }
      for(let d=1; d<=daysInMonth; d++){
        const dDate = new Date(y, mo, d);
        const iso = isoDate(dDate);
        const done = doneDates.has(iso);
        const isToday = iso === todayIso;
        const cell = document.createElement('div');
        cell.className = 'heat-day' + (done ? ' filled' : '') + (isToday ? ' today-outline' : '');
        if(done) cell.style.setProperty('--cat-color', cat.color);
        cell.title = `${iso}${done ? ' · 기록됨' : ''}`;
        grid.appendChild(cell);
      }
      heatBody.appendChild(wrap);
    });

    // Legend
    const legend = document.createElement('div');
    legend.className = 'heat-legend';
    legend.innerHTML = `
      <span>덜 기록</span>
      <div class="l-scale" style="--cat-color:${cat.color}">
        <i></i><i class="f1"></i><i class="f2"></i>
      </div>
      <span>더 기록</span>
    `;
    heatBody.appendChild(legend);
  }

  // ============ Tweaks Panel ============
  const tweaksFab = document.getElementById('tweaksFab');
  const tweaksPanel = document.getElementById('tweaksPanel');

  function applyTweaks(){
    document.documentElement.dataset.palette = tweaks.palette;
    document.documentElement.dataset.cellShape = tweaks.cellShape;
    document.documentElement.dataset.catMode = tweaks.catMode;
    document.documentElement.style.setProperty('--font-scale', tweaks.font);
    // theme-color meta
    const meta = document.querySelector('meta[name="theme-color"]');
    if(meta){
      const bg = getComputedStyle(document.documentElement).getPropertyValue('--canvas').trim();
      if(bg) meta.setAttribute('content', bg);
    }
    // Update tweak UI selected state
    document.querySelectorAll('#tPalettes .t-palette').forEach(b => {
      b.classList.toggle('active', b.dataset.pal === tweaks.palette);
    });
    document.querySelectorAll('#tCellShape .t-chip').forEach(b => {
      b.classList.toggle('active', b.dataset.shape === tweaks.cellShape);
    });
    document.querySelectorAll('#tCatMode .t-chip').forEach(b => {
      b.classList.toggle('active', b.dataset.mode === tweaks.catMode);
    });
    document.querySelectorAll('#tFont .t-chip').forEach(b => {
      b.classList.toggle('active', parseFloat(b.dataset.font) === tweaks.font);
    });
  }
  function setTweak(patch){
    Object.assign(tweaks, patch);
    saveTweaks();
    applyTweaks();
    // Also notify host for persistence via edit-mode protocol
    try{
      window.parent.postMessage({type:'__edit_mode_set_keys', edits: patch}, '*');
    }catch(e){}
  }

  // Build palette swatches
  const tPalettes = document.getElementById('tPalettes');
  PALETTES.forEach(p => {
    const b = document.createElement('button');
    b.className = 't-palette';
    b.dataset.pal = p.id;
    b.title = p.name;
    b.innerHTML = p.swatches.map(c => `<span style="background:${c}"></span>`).join('');
    b.addEventListener('click', () => setTweak({palette: p.id}));
    tPalettes.appendChild(b);
  });
  document.getElementById('tCellShape').addEventListener('click', (e) => {
    const b = e.target.closest('.t-chip'); if(!b) return;
    setTweak({cellShape: b.dataset.shape});
  });
  document.getElementById('tCatMode').addEventListener('click', (e) => {
    const b = e.target.closest('.t-chip'); if(!b) return;
    setTweak({catMode: b.dataset.mode});
  });
  document.getElementById('tFont').addEventListener('click', (e) => {
    const b = e.target.closest('.t-chip'); if(!b) return;
    setTweak({font: parseFloat(b.dataset.font)});
  });

  // Tweaks show/hide via host protocol
  let tweaksAvailable = false;
  window.addEventListener('message', (ev) => {
    const d = ev.data;
    if(!d || !d.type) return;
    if(d.type === '__activate_edit_mode'){
      tweaksFab.classList.add('on');
      tweaksAvailable = true;
    }else if(d.type === '__deactivate_edit_mode'){
      tweaksFab.classList.remove('on');
      tweaksPanel.classList.remove('on');
    }
  });
  try{ window.parent.postMessage({type:'__edit_mode_available'}, '*'); }catch(e){}

  tweaksFab.addEventListener('click', () => tweaksPanel.classList.toggle('on'));
  document.getElementById('tweaksClose').addEventListener('click', () => tweaksPanel.classList.remove('on'));

  // ============ Init ============
  applyTweaks();
  renderWeekLabel();
  renderGrid();
})();
</script>
</body>
</html>
